
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Source Mining</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="report.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <img src="logo.png" alt="logo" style="width:400px;height:200px;">
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Sale Report</h3>
            </div>
            <div class="card-body">
                <form action="https://formspree.io/f/mwvrbyzn" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Sale Rep Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="mine" class="form-label">Mine</label>
                        <input type="text" class="form-control" id="mine" name="mine" required>
                    </div>

                    <div class="mb-3">
                        <label for="c_name" class="form-label">Client Name</label>
                        <input type="text" class="form-control" id="c_name" name="c_name" required>
                    </div>

                    <div class="mb-3">
                        <label for="shaft" class="form-label">Shaft</label>
                        <input type="text" class="form-control" id="shaft" name="shaft" required>
                    </div>

                    <div class="mb-3">
                        <label for="date" class="form-label">Date:</label>
                        <input type="date" class="form-control" id="date" name="date" required>
                    </div>

                    <div class="mb-3" id="product">
                        <label for="product">Select Product:</label><br>
                        <input type="checkbox" id="rne" name="products[]" value="rne">
                        <label for="rne">RNE</label><br>
                        <input type="checkbox" id="sigma" name="products[]" value="sigma">
                        <label for="sigma">SIGMA</label><br>
                        <input type="checkbox" id="seep" name="products[]" value="seep">
                        <label for="seep">SEEP</label><br>
                        <input type="checkbox" id="comms" name="products[]" value="comms">
                        <label for="comms">COMMS</label><br>
                        <input type="checkbox" id="moxa" name="products[]" value="moxa">
                        <label for="moxa">MOXA</label><br>
                        <input type="checkbox" id="f_supp" name="products[]" value="f_supp">
                        <label for="f_supp">F/SUPP</label><br>
                    </div>

                    <div class="mb-3">
                        <label for="comments" class="form-label">Comments</label>
                        <textarea class="form-control" id="comments" name="comments" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Report</button>
                </form>
            </div>
        </div>
    </div>
    <footer>
        <div class="container">
            <p class="text-center">&copy; 2026 Radio Source Mining. All rights reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
