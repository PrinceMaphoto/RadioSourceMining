
﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radion Source Mining</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="report.css">
</head>
<body>
    <nav class="navbar" ba>
        <div class="container">
            <img src="Radiosource.png" alt="logo" style="width:400px;height:50px;">
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Technician Report</h3>
            </div>
            <div class="card-body">
                <form action="https://formspree.io/f/mwvrbyzn" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Technician Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="mine" class="form-label">Mine</label>
                        <input type="text" class="form-control" id="mine" name="mine" required>
                    </div>

                    <div class="mb-3">
                        <label for="c_name" class="form-label">Client Name</label>
                        <input type="text" class="form-control" id="c_name" name="c_name" required>
                    </div>

                    <div class="mb-3">
                        <label for="shaft" class="form-label">Shaft</label>
                        <input type="text" class="form-control" id="shaft" name="shaft" required>
                    </div>

                    <div class="mb-3">
                        <label for="date" class="form-label">Date:</label>
                        <input type="date" class="form-control" id="date" name="Date" required>
                    </div>

                    <div class="mb-3">
                        <label for="product" class="form-label">Product</label>
                        <select class="form-select" id="product" name="product" required>
                            <option value="">Select Product...</option>
                            <option value="rne">RNE</option>
                            <option value="sigma">SIGMA</option>
                            <option value="seep">SEEP</option>
                            <option value="comms">COMMS</option>
                            <option value="moxa">MOXA</option>
                            <option value="fsupp">F/SUPP</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="comments" class="form-label">Comments</label>
                        <textarea class="form-control" id="comments" name="comments" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Report</button>
                </form>
            </div>
        </div>
    </div>
    <footer>
        <div class="container">
            <p style="text-align: center">&copy; 2026 Radio Source Mining. All rights reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
